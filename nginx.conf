server {
    listen 80;
    server_name amirhosseintaheri80.ir www.amirhosseintaheri80.ir;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name amirhosseintaheri80.ir www.amirhosseintaheri80.ir;

    ssl_certificate /etc/letsencrypt/live/amirhosseintaheri80.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amirhosseintaheri80.ir/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }
}
